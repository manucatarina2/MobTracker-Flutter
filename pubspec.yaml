name: mobtracker
description: MobTracker - Collaborative Urban Mobility Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.0
  go_router: ^14.0.0
  flutter_map: ^6.1.0
  google_maps_flutter: ^2.5.0
  google_maps_flutter_web: ^0.5.0
  image_picker: ^1.1.0
  fl_chart: ^0.68.0
  intl: ^0.19.0
  shared_preferences: ^2.2.0
  google_fonts: ^6.2.0
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  equatable: ^2.0.5
  uuid: ^4.4.0
  path_provider: ^2.1.0
  permission_handler: ^11.0.0
  geolocator: ^13.0.0
  supabase_flutter: ^2.12.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/images/home.png